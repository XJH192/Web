avatar: /images/head/head.jpg

background:
  path: /images/background/xiaomai.jpg
  width: 1280
  height: 726

preset: plain

tagsCovers:
  JavaScript: /images/post/JavaScript.jpg
  TypeScript: /images/post/TypeScript.jpg
  css: /images/post/css.jpg
  node: /images/post/nodejs.jpg
  vue: /images/post/vue.jpg
  webpack: /images/post/webpack.jpg
  git: /images/post/git.jpg
  java: /images/post/java.jpg
  AI: /images/post/AI.jpg
  Hexo: /images/post/markerdown.jpg
  Design: /images/post/ui.jpg
  Tools: /images/post/editor.jpg

favicon:
  href: /images/head/head.jpg
  type: image/jpg

function:
  globalToc: true
  wordCount: true
  copyCode: true

imageCDN:
  enable: false
  origin: /../../images/
  to: ''

customStyles:
  - custom.css
iconlib: ''

menu:
  用户工作台:
    - /blog.html
    - icon-article
  管理员后台:
    - /admin.html
    - icon-appstore-fill
  归档:
    - /archives.html
    - icon-hanbao1
  相册:
    - /gallery.html
    - icon-image
  关于:
    - /about.html
    - icon-jiubei1
  动态:
    - /memos.html
    - icon-tangguo

memos:
  host: ''
  pageSize: 10
  filter: '#moments'
  avatarUrl: /images/head/head.jpg
  nickname: 本地博客系统
  enableFancybox: true
  footer: 当前为本地动态演示，不依赖外部 Memos 服务。
  localItems:
    - content: "#moments 博客系统已接入 Spring Boot 后端，文章、评论、分类、标签和 AI 日志都会写入 MySQL。"
      createTime: '2026-07-06T14:30:00+08:00'
    - content: "#moments 保留 xjh 主题风格、侧边栏组件、挂件和悬浮 AI 助手。"
      createTime: '2026-07-06T15:00:00+08:00'

widgets:
  - name: switch_theme
    enable: true
  - name: search
    enable: true
    options:
      search:
        type: local
        url: https://www.google.com/search?q=site:127.0.0.1:4000
        id: ''
  - name: social
    enable: true
    options:
      social:
        代码仓库:
          - https://github.com/XJH192/Web
          - icon-github
          - '#24201d'
          - rgba(36, 32, 29, .10)
        邮箱联系:
          - mailto:706972112@qq.com
          - icon-mail-fill
          - '#d92d20'
          - rgba(217, 45, 32, .12)
        B站主页:
          - https://www.bilibili.com/
          - icon-bilibili
          - '#fb7299'
          - rgba(251, 114, 153, .16)
  - name: category
    enable: false
  - name: tagcloud
    enable: false
    options:
      maxTagcloud: 30
  - name: hitokoto
    enable: true
    options:
      widgetHitokoto:
        local: 本地博客系统已完成前后端联动、权限控制与 AI 辅助功能。
        loading_placeholder: 小埋正在翻零食袋找一句话...
        loading_error_placeholder: 提示语躲进被窝了，稍后再试。
        category: ''
  - name: archive
    enable: false
    options:
      widgetAchive:
        archive_type: year
        show_count: true
  - name: recent_posts
    enable: false
  - name: link
    enable: false
    options:
      widgetLink:
        - title: 博客工作台
          img: /images/post/AI.jpg
          link: /blog.html

pendants:
  - name: clock
    enable: true
  - name: qweather
    enable: true

chatbot:
  enable: true
  options:
    title: AI 博客助手
    chat: /ai-widget.html
    style: 'width: 100%; height: 100%; overflow: hidden;'

copyText: '复制来源：%url'
slotHead: ''
slotFooter: ''
slotSidebar: |
  <br><span>博客系统本地演示</span>
slotComment: |
  <div class="local-comment-placeholder">评论功能已由后端接口与数据库接管。</div>
slotCopyright: |
  <strong>许可：</strong>课程实训本地演示
slotArticleEnd: |
  <hr><p class="article-end-note">本文结束，欢迎在文章详情页提交评论。</p>