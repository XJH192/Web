title: xjh 博客系统
subtitle: Spring Boot 与 MySQL 驱动的博客实训项目
description: 基于 xjh 主题、Hexo 前端、Spring Boot 后端和 MySQL 数据库的博客系统。
keywords: 博客系统,Hexo,Spring Boot,MySQL,AI
author: 博客系统
language: zh-CN
timezone: Asia/Shanghai

url: http://127.0.0.1:4000
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - ai-widget.html

  - login.html
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

theme: tangyuxian

search:
  path: search.json
  field: post

ignore:
  - '**/node_modules/hexo-theme-tangyuxian/demo-site/**'
  - '**/node_modules/hexo-theme-tangyuxian/node_modules/**'
  - '**/node_modules/hexo-theme-tangyuxian/.git/**'

server:
  port: 4000
  ip: 127.0.0.1
  cache: false
  log: false

deploy:
  type: ''