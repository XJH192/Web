<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(180deg, rgba(255,250,246,.86), rgba(255,246,241,.72)),
        url('/images/background/xiaomai.jpg') center / cover no-repeat;
      color: #2f241f;
    }
    main {
      position: relative;
      width: min(90vw, 340px);
      min-height: 520px;
      border: 1px solid rgba(230, 114, 73, .28);
      border-radius: 14px;
      padding: 22px;
      overflow: hidden;
      background: rgba(255, 250, 246, .88);
      box-shadow: 0 2px 8px rgba(87, 48, 31, .16);
    }
    main::before {
      content: '';
      position: absolute;
      inset: 88px 22px 24px;
      opacity: .16;
      background: url('/images/background/character.png') center bottom / contain no-repeat;
      pointer-events: none;
    }
    .assistant-title { position: relative; text-align: center; margin-bottom: 18px; }
    h1 { margin: 0 0 8px; color: #6f4a3c; font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif; font-size: 23px; line-height: 1.25; }
    .assistant-title span {
      display: inline-flex;
      border: 1px solid rgba(230, 114, 73, .25);
      border-radius: 999px;
      padding: 5px 10px;
      background: #fff;
      color: #d8663f;
      font-size: 12px;
      font-weight: 700;
    }
    p {
      position: relative;
      margin: 0 0 14px;
      border: 1px solid rgba(230, 114, 73, .25);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,.72);
      color: #5f4a40;
      line-height: 1.7;
    }
    textarea, button {
      position: relative;
      width: 100%;
      border-radius: 10px;
      font: inherit;
    }
    textarea {
      min-height: 96px;
      padding: 12px;
      border: 1px solid rgba(230, 114, 73, .28);
      background: rgba(255,255,255,.86);
      color: #2f241f;
      resize: vertical;
      outline: none;
    }
    textarea::placeholder { color: #7a6256; opacity: 1; }
    textarea:focus { border-color: #e67249; box-shadow: 0 0 0 3px rgba(230,114,73,.16); }
    button {
      margin-top: 10px;
      border: 0;
      padding: 11px;
      color: white;
      background: #e67249;
      cursor: pointer;
      font-weight: 750;
    }
    button:hover { background: #c95531; }
    #answer {
      position: relative;
      margin-top: 12px;
      min-height: 84px;
      border: 1px solid rgba(230, 114, 73, .22);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,.76);
      color: #4b382f;
      line-height: 1.7;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <div class="assistant-title">
      <h1>xjh 智能体</h1>
      <span>博客问答 · 内容辅助</span>
    </div>
    <p>可以询问当前博客已有文章的内容，也可以让它帮你梳理写作思路。回答记录会同步到数据库日志。</p>
    <textarea id="question" placeholder="例如：这个博客系统实现了哪些功能？"></textarea>
    <button id="ask">发送</button>
    <div id="answer">等待你的问题。</div>
  </main>
  <script>
    const apiBase = 'http://127.0.0.1:8080/api';
    const answer = document.getElementById('answer');
    document.getElementById('ask').addEventListener('click', async function () {
      const question = document.getElementById('question').value.trim();
      if (!question) {
        answer.textContent = '请先输入问题。';
        return;
      }
      answer.textContent = 'AI 正在思考...';
      try {
        const response = await fetch(apiBase + '/ai/qa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const json = await response.json();
        answer.textContent = json.success ? json.data.answer : (json.message || '请求失败');
      } catch (error) {
        answer.textContent = '无法连接后端，请先启动系统服务。';
      }
    });
  </script>
</body>
</html>
