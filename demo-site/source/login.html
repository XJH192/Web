<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - xjh 博客系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #e67249;
      --primary-strong: #d95f38;
      --primary-soft: rgba(230, 114, 73, .12);
      --ink: #241f1c;
      --muted: #5f5149;
      --surface: rgba(255, 255, 255, .94);
      --line: rgba(230, 114, 73, .26);
      --danger: #b83131;
      --focus: rgba(230, 114, 73, .22);
    }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: #fff4ee url('/images/background/xiaomai.jpg') center / cover fixed no-repeat;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 247, 241, .9), rgba(255, 250, 246, .72) 46%, rgba(53, 36, 25, .42));
    }
    .auth-shell {
      position: relative;
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: minmax(260px, .9fr) minmax(320px, 420px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 2px 8px rgba(52, 36, 26, .18);
    }
    .auth-brand {
      min-height: 520px;
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(77, 42, 29, .52), rgba(77, 42, 29, .22)),
        url('/images/background/xiaomai.jpg') center / cover no-repeat;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .brand-lockup img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .86);
    }
    .brand-lockup strong {
      display: block;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      font-size: 22px;
      letter-spacing: 0;
    }
    .brand-lockup span,
    .brand-copy p,
    .brand-note {
      color: rgba(255, 255, 255, .88);
      line-height: 1.7;
    }
    .brand-copy h1 {
      max-width: 9em;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      margin-bottom: 14px;
      font-size: 30px;
      line-height: 1.18;
      text-wrap: balance;
    }
    .brand-note {
      padding-top: 18px;
      border-top: 1px solid rgba(255, 255, 255, .28);
      font-size: 13px;
    }
    .auth-card {
      padding: 38px;
      background: rgba(255, 255, 255, .96);
    }
    .form-container {
      position: relative;
      min-height: 324px;
    }
    .form-panel {
      position: absolute;
      width: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: opacity .18s ease, transform .18s ease, visibility .18s ease;
    }
    .form-panel.active {
      position: relative;
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .form-panel h2 {
      margin-bottom: 6px;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      font-size: 24px;
      line-height: 1.25;
      text-wrap: balance;
    }
    .form-intro {
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .form-field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      color: #453a34;
      font-size: 14px;
      font-weight: 650;
    }
    input {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 14px;
      outline: none;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    input::placeholder { color: #76675f; opacity: 1; }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--focus);
      background: #fff;
    }
    .primary-btn {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 10px;
      padding: 0 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 750;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: background .18s ease, transform .18s ease;
    }
    .primary-btn:hover { background: var(--primary-strong); transform: translateY(-1px); }
    .primary-btn:active { transform: translateY(0); }
    .switch-link {
      display: block;
      margin-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .switch-link button {
      background: none;
      border: none;
      color: var(--primary-strong);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--primary-strong);
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
    }
    .demo-tip {
      margin-top: 24px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--primary-soft);
      color: #4e4038;
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }
    .demo-tip strong { color: var(--primary-strong); }
    @media (max-width: 760px) {
      body { padding: 14px; align-items: start; }
      .auth-shell { grid-template-columns: 1fr; }
      .auth-brand { min-height: 210px; padding: 24px; gap: 28px; }
      .brand-copy h1 { font-size: 24px; max-width: none; }
      .brand-note { display: none; }
      .auth-card { padding: 26px 22px; }
      .form-container { min-height: 318px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; }
      .primary-btn:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main class="auth-shell" aria-label="博客系统登录">
    <section class="auth-brand" aria-label="系统介绍">
      <div class="brand-lockup">
        <img src="/images/head/head.jpg" alt="博客系统头像">
        <div>
          <strong>xjh 博客系统</strong>
          <span>Spring Boot · MySQL · Hexo</span>
        </div>
      </div>
      <div class="brand-copy">
        <h1>登录后进入你的博客工作区</h1>
        <p>普通用户写作、互动；管理员审核文章、评论和用户状态。背景与主题风格保持原项目氛围。</p>
      </div>
      <p class="brand-note">未登录时只显示登录入口，登录成功后会按身份自动跳转。</p>
    </section>

    <section class="auth-card">
      <div class="form-container">
        <div class="form-panel active" id="login-panel">
          <h2>账号登录</h2>
          <p class="form-intro">请输入数据库中已有的用户名和密码。</p>
          <form id="login-form">
            <div class="form-field">
              <label for="login-username">用户名</label>
              <input id="login-username" autocomplete="username" required placeholder="请输入用户名">
            </div>
            <div class="form-field">
              <label for="login-password">密码</label>
              <input id="login-password" type="password" autocomplete="current-password" required placeholder="请输入密码">
            </div>
            <button class="primary-btn" type="submit">登录系统</button>
          </form>
          <div id="login-status" class="status" aria-live="polite"></div>
          <div class="switch-link">
            还没有账号？<button type="button" id="show-register">立即注册</button>
          </div>
        </div>

        <div class="form-panel" id="register-panel">
          <h2>注册用户</h2>
          <p class="form-intro">注册后默认是普通用户，管理员可在后台调整身份。</p>
          <form id="register-form">
            <div class="form-field">
              <label for="register-username">用户名</label>
              <input id="register-username" autocomplete="username" required placeholder="请输入用户名">
            </div>
            <div class="form-field">
              <label for="register-nickname">昵称</label>
              <input id="register-nickname" required placeholder="请输入昵称">
            </div>
            <div class="form-field">
              <label for="register-password">密码</label>
              <input id="register-password" type="password" autocomplete="new-password" required placeholder="请输入密码">
            </div>
            <button class="primary-btn" type="submit">注册普通用户</button>
          </form>
          <div id="register-status" class="status" aria-live="polite"></div>
          <div class="switch-link">
            已有账号？<button type="button" id="show-login">返回登录</button>
          </div>
        </div>
      </div>

      <div class="demo-tip">
        测试账号：<strong>admin / 123456</strong> 或 <strong>user / 123456</strong>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const API_BASE = 'http://127.0.0.1:8080/api';

      const loginPanel = document.getElementById('login-panel');
      const registerPanel = document.getElementById('register-panel');
      const showRegisterBtn = document.getElementById('show-register');
      const showLoginBtn = document.getElementById('show-login');

      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const loginStatus = document.getElementById('login-status');
      const registerStatus = document.getElementById('register-status');

      function switchPanel(hidePanel, showPanel) {
        hidePanel.classList.remove('active');
        setTimeout(() => { showPanel.classList.add('active'); }, 120);
      }

      showRegisterBtn.addEventListener('click', () => {
        switchPanel(loginPanel, registerPanel);
        registerForm.reset();
        registerStatus.textContent = '';
      });

      showLoginBtn.addEventListener('click', () => {
        switchPanel(registerPanel, loginPanel);
        loginForm.reset();
        loginStatus.textContent = '';
      });

      function setStatus(el, text) { el.textContent = text || ''; }
      function redirectByRole(user) { location.href = user.role === 'ADMIN' ? '/admin.html' : '/blog.html'; }
      function saveSession(data) {
        localStorage.setItem('blogToken', data.token);
        localStorage.setItem('blogUser', JSON.stringify(data.user));
      }

      async function request(path, options) {
        let response;
        try {
          response = await fetch(API_BASE + path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, options || {}));
        } catch (error) {
          throw new Error('无法连接后端服务，请确认 npm run web 已启动');
        }
        const json = await response.json();
        if (!response.ok || !json.success) throw new Error(json.message || '请求失败');
        return json.data;
      }

      loginForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        setStatus(loginStatus, '正在校验账号...');
        try {
          const data = await request('/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              username: document.getElementById('login-username').value.trim(),
              password: document.getElementById('login-password').value
            })
          });
          saveSession(data);
          setStatus(loginStatus, '登录成功，正在进入对应页面');
          setTimeout(() => redirectByRole(data.user), 260);
        } catch (error) {
          setStatus(loginStatus, error.message);
        }
      });

      registerForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        setStatus(registerStatus, '正在写入数据库...');
        try {
          await request('/auth/register', {
            method: 'POST',
            body: JSON.stringify({
              username: document.getElementById('register-username').value.trim(),
              nickname: document.getElementById('register-nickname').value.trim(),
              password: document.getElementById('register-password').value
            })
          });
          setStatus(registerStatus, '注册成功，即将返回登录');
          setTimeout(() => {
            switchPanel(registerPanel, loginPanel);
            registerForm.reset();
            registerStatus.textContent = '';
          }, 1000);
        } catch (error) {
          setStatus(registerStatus, error.message);
        }
      });
    }());
  </script>
</body>
</html>
